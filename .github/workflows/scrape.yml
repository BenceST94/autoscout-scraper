name: AutoScout24 Scraper

on:
  schedule:
    - cron: '0 4 * * 1'  # Minden hétfőn hajnali 4-kor fut
  workflow_dispatch:       # Kézi futtatás is lehetséges a GitHub felületéről

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Függőségek telepítése
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Scraper futtatása
        run: python autoscout_grid.py

      - name: Eredmény commitolása és pusholása
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add autoscout_widget.html
          git diff --staged --quiet || git commit -m "AutoScout frissítés - $(date '+%Y-%m-%d')"
          git push
